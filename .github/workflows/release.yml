name: Release

on:
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          DATE=$(date -u +%Y.%m.%d)
          SEQ=1
          for tag in $(git tag -l "v${DATE}.*"); do
            N=${tag##*.}
            if [ "$N" -ge "$SEQ" ]; then
              SEQ=$((N + 1))
            fi
          done
          VERSION="v${DATE}.${SEQ}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

  build-app:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          provenance: false
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  build-sandbox:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: docker/sandbox
          file: docker/sandbox/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/whiteagent-org/sandbox:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/whiteagent-org/sandbox:latest
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

  release:
    runs-on: ubuntu-latest
    needs: [version, build-app, build-sandbox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git tag "${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Generate release notes and create release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
