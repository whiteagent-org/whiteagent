<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Secrets</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
  .container { max-width: 480px; width: 100%; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 32px; }
  h1 { font-size: 1.4rem; margin-bottom: 24px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem; }
  .input-wrap { position: relative; }
  .input-wrap input { width: 100%; padding: 10px 40px 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; }
  .input-wrap input:disabled, .input-wrap textarea:disabled { background: #f0f0f0; }
  .input-wrap textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; font-family: monospace; resize: vertical; min-height: 120px; }
  .eye-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #666; padding: 4px; display: flex; align-items: center; }
  .eye-btn svg { width: 20px; height: 20px; }
  .field-options { display: flex; justify-content: space-between; margin-top: 6px; }
  .no-value, .file-mode { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #888; cursor: pointer; font-weight: 400; }
  .no-value input, .file-mode input { width: 14px; height: 14px; margin: 0; cursor: pointer; }
  button[type="submit"] { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
  button[type="submit"]:disabled { background: #94a3b8; cursor: not-allowed; }
  button[type="submit"]:not(:disabled):hover { background: #1d4ed8; }
  .message { padding: 16px; border-radius: 8px; margin-top: 16px; text-align: center; font-weight: 500; }
  .message.success { background: #dcfce7; color: #166534; }
  .message.error { background: #fee2e2; color: #991b1b; }
  .error-page { text-align: center; color: #666; padding: 40px 0; }
</style>
</head>
<body>
<div class="container" id="app">
  <h1>Set Secrets</h1>
  <form id="secretForm">
    {{range .Keys}}
    <div class="field" data-field="{{.}}">
      <label>{{.}}</label>
      <div class="input-wrap">
        <input type="password" name="{{.}}" autocomplete="off" data-key="{{.}}">
        <button type="button" class="eye-btn" aria-label="Toggle visibility"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <div class="field-options">
        <label class="file-mode"><input type="checkbox" data-filemode="{{.}}"> File</label>
        <label class="no-value"><input type="checkbox" data-novalue="{{.}}"> No value</label>
      </div>
    </div>
    {{end}}
    <button type="submit" id="submitBtn" disabled>Save Secrets</button>
  </form>
  <div id="msg" class="message" style="display:none"></div>
</div>
<script>
(function() {
  var form = document.getElementById('secretForm');
  var btn = document.getElementById('submitBtn');
  var msgEl = document.getElementById('msg');
  var token = '{{.Token}}';
  var modeHints = {{.ModesJSON}};

  var eyeOpen = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  var eyeOff = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

  // Toggle password visibility.
  form.querySelectorAll('.eye-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      var inp = b.parentElement.querySelector('input');
      if (!inp) return;
      var showing = inp.type === 'password';
      inp.type = showing ? 'text' : 'password';
      b.innerHTML = showing ? eyeOff : eyeOpen;
    });
  });

  // File mode toggle: switch between password input and textarea.
  form.querySelectorAll('[data-filemode]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var key = cb.getAttribute('data-filemode');
      var field = form.querySelector('[data-field="' + key + '"]');
      var wrap = field.querySelector('.input-wrap');
      var eyeBtn = wrap.querySelector('.eye-btn');

      if (cb.checked) {
        // Switch to textarea.
        var inp = wrap.querySelector('input[data-key="' + key + '"]');
        var ta = document.createElement('textarea');
        ta.setAttribute('data-key', key);
        ta.setAttribute('name', key);
        ta.placeholder = 'Paste file content here...';
        if (inp) {
          ta.value = inp.value;
          inp.replaceWith(ta);
        }
        if (eyeBtn) eyeBtn.style.display = 'none';
        ta.addEventListener('input', checkReady);
      } else {
        // Switch back to password input.
        var ta = wrap.querySelector('textarea[data-key="' + key + '"]');
        var inp = document.createElement('input');
        inp.type = 'password';
        inp.setAttribute('data-key', key);
        inp.setAttribute('name', key);
        inp.setAttribute('autocomplete', 'off');
        if (ta) {
          inp.value = ta.value;
          ta.replaceWith(inp);
        }
        if (eyeBtn) eyeBtn.style.display = '';
        inp.addEventListener('input', checkReady);
      }
      checkReady();
    });
  });

  // "No value" checkbox disables and clears the input.
  form.querySelectorAll('[data-novalue]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var key = cb.getAttribute('data-novalue');
      var el = form.querySelector('[data-key="' + key + '"]');
      el.disabled = cb.checked;
      if (cb.checked) { el.value = ''; }
      checkReady();
    });
  });

  // Enable submit only when every field has a value or its "No value" is checked.
  function checkReady() {
    var ready = true;
    form.querySelectorAll('[data-key]').forEach(function(el) {
      var key = el.getAttribute('data-key');
      var cb = form.querySelector('[data-novalue="' + key + '"]');
      if (!cb.checked && el.value.trim() === '') { ready = false; }
    });
    btn.disabled = !ready;
  }

  form.querySelectorAll('[data-key]').forEach(function(el) {
    el.addEventListener('input', checkReady);
  });

  // Apply mode hints from token (pre-select file mode).
  if (modeHints) {
    Object.keys(modeHints).forEach(function(key) {
      if (modeHints[key] === 'file') {
        var cb = form.querySelector('[data-filemode="' + key + '"]');
        if (cb) {
          cb.checked = true;
          cb.dispatchEvent(new Event('change'));
        }
      }
    });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Saving...';

    var values = {};
    form.querySelectorAll('[data-key]').forEach(function(el) {
      var key = el.getAttribute('data-key');
      var cb = form.querySelector('[data-novalue="' + key + '"]');
      var fileCb = form.querySelector('[data-filemode="' + key + '"]');
      var mode = (fileCb && fileCb.checked) ? 'file' : 'value';
      values[key] = {
        value: cb.checked ? '' : el.value,
        mode: mode
      };
    });

    fetch('/secrets/' + token, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(values)
    })
    .then(function(resp) { return resp.json().then(function(data) { return { ok: resp.ok, data: data }; }); })
    .then(function(result) {
      if (result.ok && result.data.ok) {
        form.style.display = 'none';
        msgEl.className = 'message success';
        msgEl.textContent = 'Secrets saved successfully.';
        msgEl.style.display = 'block';
      } else {
        msgEl.className = 'message error';
        msgEl.textContent = result.data.error || 'An error occurred.';
        msgEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Save Secrets';
      }
    })
    .catch(function() {
      msgEl.className = 'message error';
      msgEl.textContent = 'Network error. Please try again.';
      msgEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Save Secrets';
    });
  });
})();
</script>
</body>
</html>
